<!doctype html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GitHub Issue Tracker</title>
        <!-- Tailwind + daisyUI -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
        <script
            src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
            rel="stylesheet">
        <style>
        *{font-family: "Geist", sans-serif;}
        </style>
    </head>

    <body class="bg-[#F8FAFC]">
        <main class="min-h-screen flex items-center justify-center px-4 py-16">

            <div class="bg-white rounded-xl shadow-lg p-8 space-y-6
              w-full max-w-md">

                <div class="text-center space-y-3">
                    <img src="./assets/github-logo.png" class="w-20 mx-auto"
                        alt="github logo">
                    <h1 class="text-2xl font-semibold text-gray-800">GitHub
                        Issues Tracker</h1>
                    <p class="text-gray-500 text-sm">Sign in to manage your
                        issues</p>
                </div>

                <!-- Username -->
                <div class="space-y-1">
                    <label
                        class="text-sm font-medium text-gray-700">Username</label>
                    <input type="text" placeholder="Enter Username"
                        class="input input-bordered w-full">
                    <p class="text-xs text-blue-600">Default: admin</p>
                </div>
                <!-- Password -->
                <div class="space-y-1">
                    <label class="text-sm font-medium text-gray-700">
                        Password
                    </label>
                    <input type="password" placeholder="Enter Password"
                        class="input input-bordered w-full">
                    <p class="text-xs text-blue-600">
                        Default: admin123
                    </p>
                </div>
                <button class="btn btn-primary w-full">Sign In</button>

                <div class="flex items-center gap-2 my-3">
                    <div class="flex-1 h-px bg-gray-300"></div>
                    <span class="text-black text-sm">OR</span>
                    <div class="flex-1 h-px bg-gray-300"></div>
                </div>

                <!-- Demo credentials -->
                <div>
                    <div>
                        <p
                            class="text-gray-500 text-center text-sm">Demo Credentials:<br><br>
                        </p>
                    </div>
                    <div
                        class="bg-gray-100 rounded-lg p-3 text-center text-sm text-gray-700">
                        <p class="text-gray-500 mb-2">
                            <strong class="bold text-black">Username: </strong>
                            admin <br>
                            <strong class="bold text-black">Password: </strong>
                            admin123
                        </p>
                    </div>
                </div>

            </div>
        </main>
        <script src="./scripts/script.js"></script>
    </body>
</html>
