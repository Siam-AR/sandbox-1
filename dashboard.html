<!doctype html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GitHub Issue Tracker Dashboard</title>
        <!-- Tailwind + daisyUI -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
        <script
            src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
            rel="stylesheet">
        <!-- Icon -->
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
        <style>
        *{font-family: "Geist", sans-serif;}
        </style>
    </head>

    <body class="bg-[#F8FAFC]">

        <header>

            <!-- Navbar -->
            <section>

                <div
                    class="navbar px-4 md:px-10 bg-base-100 shadow-sm flex-col md:flex-row gap-4 md:gap-0">

                    <div class="flex-1 flex items-center gap-3">
                        <img src="./assets/github-logo.png"
                            class="w-10 h-10 object-contain">
                        <a class="text-lg md:text-xl font-semibold">GitHub Issue
                            Tracker</a>
                    </div>

                    <div
                        class="flex flex-col sm:flex-row gap-2 w-full md:w-auto">

                        <label class="input w-full md:w-64">
                            <svg class="h-[1em] opacity-50"
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24">
                                <g stroke-linejoin="round"
                                    stroke-linecap="round" stroke-width="2.5"
                                    fill="none" stroke="currentColor">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.3-4.3"></path>
                                </g>
                            </svg>
                            <input type="search"
                                placeholder="Search issues..." />
                        </label>

                        <button class="btn btn-primary w-full sm:w-auto">
                            <i class="fa-solid fa-plus"></i> New Issue
                        </button>

                    </div>
                </div>

            </section>

            <!-- Filter Navigation -->
            <section>

                <div
                    class="my-4 w-11/12 md:w-10/12 mx-auto bg-white p-3 shadow-md flex flex-wrap items-center gap-2 rounded-xl">

                    <button
                        onclick="toggleStyle('all-filter-btn');filterIssues('all')"
                        id="all-filter-btn"
                        class="btn btn-primary text-white">
                        All
                    </button>

                    <button
                        onclick="toggleStyle('open-filter-btn');filterIssues('open')"
                        id="open-filter-btn"
                        class="btn">
                        Open
                    </button>

                    <button
                        onclick="toggleStyle('closed-filter-btn');filterIssues('closed')"
                        id="closed-filter-btn"
                        class="btn">
                        Closed
                    </button>

                </div>

            </section>

        </header>

        <main>

            <!-- Issues Header -->
            <section id="issue-tracker">

                <div
                    class="my-2 w-11/12 md:w-10/12 mx-auto bg-white p-5 shadow-md flex flex-col md:flex-row items-start md:items-center gap-4 rounded-t-xl">

                    <img src="./assets/Aperture.png" alt="Logo" class="w-8">

                    <div class="flex flex-col flex-1">
                        <h1 class="text-xl md:text-2xl font-bold">
                            <span id="issues-count">0</span> Issues
                        </h1>
                        <p class="text-gray-500 text-sm md:text-base">
                            Track and manage your project issues
                        </p>
                    </div>

                    <div class="flex gap-4 text-sm">

                        <div class="flex items-center gap-1">
                            <div
                                class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
                            <span>Open</span>
                        </div>

                        <div class="flex items-center gap-1">
                            <div
                                class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
                            <span>Closed</span>
                        </div>

                    </div>

                </div>

            </section>

            <!-- Cards -->
            <section
                id="allCards"
                class="w-11/12 md:w-10/12 mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-4 gap-5 mt-5">
            </section>

            <section id="filtered-section" class="hidden"></section>

            <!-- Spinner -->
            <section id="spinner" class="flex justify-center py-10 hidden">
                <span class="loading loading-bars loading-xl"></span>
            </section>

            <!-- Modal -->
            <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">

                <div class="modal-box w-full max-w-3xl px-4 md:px-8">

                    <div id="issue-details-container"></div>

                    <div class="modal-action">
                        <form method="dialog">
                            <button class="btn btn-primary">Close</button>
                        </form>
                    </div>

                </div>

            </dialog>

        </main>

        <script src="./scripts/script.js"></script>

    </body>
</html>
