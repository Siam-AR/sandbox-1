<!doctype html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GitHub Issue Tracker Dashboard</title>
        <!-- Tailwind + daisyUI -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
        <script
            src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
            rel="stylesheet">
        <!-- Icon -->
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
        <style>
        *{font-family: "Geist", sans-serif;}
        </style>
    </head>
    <body class="bg-[#F8FAFC]">
        <header>
            <!-- Navbar -->
            <section>
                <div class="navbar pl-10 pr-10 bg-base-100 shadow-sm">
                    <div class="flex-1 flex items-center gap-3">
                        <img src="./assets/github-logo.png" alt="GitHub Logo"
                            class="w-10 h-10 object-contain">
                        <a class="text-xl font-semibold">GitHub Issue
                            Tracker</a>
                    </div>
                    <div class="flex gap-2">
                        <label class="input">
                            <svg class="h-[1em] opacity-50"
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24">
                                <g
                                    stroke-linejoin="round"
                                    stroke-linecap="round"
                                    stroke-width="2.5"
                                    fill="none"
                                    stroke="currentColor">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.3-4.3"></path>
                                </g>
                            </svg>
                            <input type="search" required
                                placeholder="Search issues..." />
                        </label>
                        <button class="btn btn-primary"><i
                                class="fa-solid fa-plus"></i>New Issue</button>
                    </div>
                </div>
            </section>

            <!--Page Navigation Toggle -->
            <section>
                <div
                    class="my-2 w-10/12 mx-auto bg-white p-2 mt-20 shadow-md flex items-center rounded-xl">
                    <div
                        class="p-3 gap-3">
                        <button
                            onclick="toggleStyle('all-filter-btn');filterIssues('all')"
                            id="all-filter-btn"
                            class="btn btn-primary text-white">All</button>

                        <button
                            onclick="toggleStyle('open-filter-btn');filterIssues('open')"
                            id="open-filter-btn" class="btn">Open</button>

                        <button
                            onclick="toggleStyle('closed-filter-btn');filterIssues('closed')"
                            id="closed-filter-btn" class="btn">Closed</button>
                    </div>
                </div>
            </section>
        </header>
        <main>
            <!-- issues-tracker -->
            <section id="issue-tracker">
                <div
                    class="my-2 w-10/12 mx-auto bg-white p-5 mt-5 shadow-md flex items-center gap-2 rounded-t-xl">

                    <img src="./assets/Aperture.png" alt="Logo">

                    <div class="flex flex-col flex-1">
                        <h1 class="text-2xl font-bold"><span
                                id="issues-count">0</span> Issues</h1>
                        <p class="text-gray-500">Track and manage your project
                            issues</p>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex items-center gap-1">
                            <div
                                class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
                            <span>Open</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <div
                                class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
                            <span>Closed</span>
                        </div>
                    </div>

                </div>
            </section>
            <section
                id="allCards"
                class="w-10/12 mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mt-5">
            </section>

            <section id="filtered-section" class="hidden">

            </section>

            <!-- spiner -->
            <section id="spinner" class="flex justify-center py-10 hidden">
                <span class="loading loading-bars loading-xl"></span>
            </section>

            <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
                <div class="modal-box">
                    <div id="issue-details-container"></div>
                    <div class="modal-action">
                        <form method="dialog">
                            <button class="btn btn-primary">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>
        </main>
        <script src="./scripts/script.js"></script>
    </body>
</html>
